<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Brewed Awakenings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <span>☕</span>
        <h2>Welcome Back</h2>
        <p>Sign in to your Brewed Awakenings account</p>
      </div>

      <form class="auth-form" id="login-form" novalidate>

        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrap">
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email"/>
          </div>
          <p class="field-error" id="email-err"></p>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password"/>
            <span class="toggle-pw" title="Toggle visibility">👁</span>
          </div>
          <p class="field-error" id="pw-err"></p>
        </div>

        <button type="submit" class="auth-submit">Sign In</button>

        <div class="auth-divider">or</div>

        <div class="auth-switch">
          Don't have an account? <a href="register.html">Create one free →</a>
        </div>
        <div class="auth-switch" style="margin-top:.5rem">
          <a href="../index.html" style="color:#9c7c5e">← Back to Home</a>
        </div>

      </form>

      <!-- Demo hint -->
      <div style="margin-top:1.5rem;padding:1rem;background:#fdf6ed;border-radius:10px;font-size:.82rem;color:#5a3e2b;border:1px solid #e0d0c0">
        <strong>New here?</strong> <a href="register.html" style="color:#c8843a">Register first</a> — your account is saved in your browser automatically.
      </div>

    </div>
  </div>

  <script src="../js/auth.js"></script>
</body>
</html>
